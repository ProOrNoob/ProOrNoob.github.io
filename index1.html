<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Debug Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: #20c997;
            color: white;
            border: none;
            border-radius: 8px;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.98);
            background-color: #1aa179;
        }

        .debug-grid {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card {
            background: #f8f9fa;
            padding: 10px;
            border-left: 4px solid #20c997;
            border-radius: 4px;
        }

        .label {
            font-size: 12px;
            color: #6c757d;
            display: block;
            margin-bottom: 5px;
        }

        .value {
            font-family: monospace;
            font-weight: bold;
            color: #333;
        }

        #hover-zone {
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            border: 2px dashed #ccc;
            color: #999;
        }

        #hover-zone.active {
            background: #fff3cd;
            border-color: #ffc107;
            color: #856404;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Debug Console</h2>
    
    <button id="check-btn">CLICK TO INSPECT</button>

    <div id="hover-zone">Rê chuột vào vùng này để test Hover</div>

    <div class="debug-grid">
        <div class="card">
            <span class="label">SỬ DỤNG CHUỘT?</span>
            <span id="mouse-true" class="value">--</span>
        </div>
        <div class="card">
            <span class="label">THIẾT BỊ (DETECT)</span>
            <span id="device-type" class="value">--</span>
        </div>
        <div class="card">
            <span class="label">MÀN HÌNH (RES)</span>
            <span id="screen-res" class="value">--</span>
        </div>
        <div class="card">
            <span class="label">TRÌNH DUYỆT (VIEWPORT)</span>
            <span id="viewport-res" class="value">--</span>
        </div>
        <div class="card" style="grid-column: span 2;">
            <span class="label">POINTER TYPE (LẦN CLICK CUỐI)</span>
            <span id="pointer-type" class="value">--</span>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('check-btn');
    const hoverZone = document.getElementById('hover-zone');

    // 1. Theo dõi Hover mượt mà
    hoverZone.addEventListener('mouseenter', () => hoverZone.classList.add('active'));
    hoverZone.addEventListener('mouseleave', () => hoverZone.classList.remove('active'));

    // 2. Xử lý chính khi Click
    btn.addEventListener('click', (event) => {
        // A. Kiểm tra pointer (Chuột hay Tay chạm)
        // event.pointerType sẽ trả về 'mouse', 'touch', hoặc 'pen'
        const pType = event.pointerType || "N/A";
        const isMouse = (pType === 'mouse');

        // B. Detect thiết bị
        const ua = navigator.userAgent;
        let device = "Desktop";
        if (/Android|iPhone|iPad/i.test(ua)) device = "Mobile/Tablet";

        // C. Độ phân giải
        const screenWidth = window.screen.width;
        const screenHeight = window.screen.height;
        const viewWidth = window.innerWidth;
        const viewHeight = window.innerHeight;

        // D. Hiển thị lên giao diện
        document.getElementById('mouse-true').innerText = isMouse ? "TRUE" : "FALSE";
        document.getElementById('mouse-true').style.color = isMouse ? "green" : "red";
        
        document.getElementById('device-type').innerText = device;
        document.getElementById('pointer-type').innerText = pType.toUpperCase();
        document.getElementById('screen-res').innerText = `${screenWidth} x ${screenHeight}`;
        document.getElementById('viewport-res').innerText = `${viewWidth} x ${viewHeight}`;

        console.log("--- Debug Info ---");
        console.log("Is Mouse:", isMouse);
        console.log("Pointer Type:", pType);
        console.log("User Agent:", ua);
    });
</script>

</body>
</html>
