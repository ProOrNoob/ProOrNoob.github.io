<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="Collection of Nikaya Suttas in Pali, English, and Vietnamese, sourced from SuttaCentral and Bilara json project">
  <title>Sutta Archive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Noto+Serif:ital,wght@0,400;0,500;1,400&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   Monastic Minimal — Sutta Archive
   ============================================================ */
:root {
  --bg: #f5f3ee;
  --bg-2: #efece4;
  --panel: #ffffff;
  --ink: #14120e;
  --ink-2: #423f37;
  --ink-3: #7a7467;
  --ink-4: #aea89a;
  --rule: #dcd7c9;
  --rule-2: #e8e3d5;
  --accent: #8f5e15;
  --accent-2: #b37d24;
  --highlight: rgba(143,94,21,0.08);
  --serif: "Spectral", "Noto Serif", Georgia, "Times New Roman", serif;
  --serif-vi: "Spectral", ui-serif, "Iowan Old Style", "Charter", "Palatino Linotype", "Palatino", Georgia, serif;
  /* Font riêng cho Pāli — Noto Serif có full glyph Latin Extended Additional
     (ṁ ṇ ṭ ḍ ṅ ñ ḷ…) nên tránh được hiện tượng mixed-font khi Spectral italic
     không có sẵn các dấu phụ. */
  --serif-pali: "Noto Serif", "Spectral", "Gentium Plus", Georgia, "Times New Roman", serif;
  --mono: "Geist Mono", ui-monospace, Menlo, monospace;
  --sutra-font-scale: 1;
  --sutra-line-height: 1.75;
  --visible-cols: 3;
  --transition: 0.2s ease;
}

[data-theme="dark"] {
  --bg: #0b0c0e;
  --bg-2: #0f1113;
  --panel: #14161a;
  --ink: #e8e6e0;
  --ink-2: #b5b0a4;
  --ink-3: #797669;
  --ink-4: #4a4840;
  --rule: #1f2126;
  --rule-2: #2a2c32;
  --accent: #d4a354;
  --accent-2: #eec07b;
  --highlight: rgba(212,163,84,0.10);
}

* { box-sizing: border-box; }
*, a, body, button, html, input, label { -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--serif);
  font-weight: 400;
  font-size: 17px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "liga", "kern";
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 1200px 600px at 50% 0%,
    color-mix(in oklab, var(--accent) 5%, transparent),
    transparent 70%);
  pointer-events: none;
  z-index: 1;
}

:lang(vi), [lang="vi"], .vie, #subtitle.vi, .vi-text {
  font-family: var(--serif-vi);
}

/* ============================================================
   Layout frame
   ============================================================ */
.app {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: stretch;
  padding: 0;
  position: relative;
  z-index: 2;
}

.card {
  width: 100%;
  max-width: none;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: transparent;
  position: relative;
  overflow: hidden;
}

/* ============================================================
   Top dedication bar
   ============================================================ */
.top-bar {
  flex: 0 0 auto;
  position: relative;
  z-index: 10;
  background: color-mix(in oklab, var(--bg) 92%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--rule);
}
.bar-in {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 5px 24px;
  gap: 16px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.bar-left { display: flex; gap: 4px; align-items: center; min-width: 0; }
.bar-center {
  text-align: center;
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 11.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bar-center::before, .bar-center::after {
  content: "";
  display: block;
  width: 26px;
  height: 1px;
  background: color-mix(in oklab, var(--accent) 40%, transparent);
  flex-shrink: 0;
}
.ded-phrase-text {
  display: inline-block;
  transition: opacity .45s ease;
  will-change: opacity;
}
.bar-right {
  display: flex;
  justify-content: flex-end;
  gap: 4px;
  min-width: 0;
}
.bar-icon-btn {
  background: none;
  border: 0;
  padding: 4px 7px;
  color: var(--ink-3);
  opacity: 0.75;
  font: inherit;
  font-family: var(--mono);
  font-size: 12.5px;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-radius: 2px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: opacity .15s, color .15s;
  min-width: 28px;
  height: 28px;
}
.bar-icon-btn:hover { color: var(--ink); opacity: 1; }
.bar-icon-btn svg { width: 15px; height: 15px; display: block; }

/* Dark-mode toggle — icon moon/sun swap theo data-theme */
#btnDarkMode .icon-sun { display: none; }
#btnDarkMode .icon-moon { display: block; }
[data-theme="dark"] #btnDarkMode .icon-moon { display: none; }
[data-theme="dark"] #btnDarkMode .icon-sun { display: block; }

/* Language code badge — thay cờ màu bằng text mono uppercase "VI"/"EN" */
.lang-code {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: currentColor;
  line-height: 1;
  padding: 0 2px;
}

/* ============================================================
   Title block (#supertitle, #title, #subtitle, #titleMeta)
   ============================================================ */
.header {
  flex: 0 0 auto;
  padding: 32px 32px 28px;
  text-align: center;
  border-bottom: 1px solid var(--rule);
  transition: margin-top .3s cubic-bezier(.4,0,.2,1), opacity .3s, padding .3s;
  will-change: margin-top, opacity;
}
#supertitle {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
  min-height: 12px;
  line-height: 1.2;
}
#supertitle:empty { display: none; }
#title {
  margin: 0;
  font-family: var(--serif);
  font-weight: 300;
  font-style: normal;
  font-size: calc(38px * var(--sutra-font-scale));
  letter-spacing: -0.012em;
  line-height: 1.1;
  color: var(--ink);
  text-transform: none;
  white-space: normal;
  overflow: visible;
  text-overflow: unset;
}
#subtitle {
  margin-top: 10px;
  font-family: var(--serif-pali);
  font-style: italic;
  font-weight: 400;
  font-size: calc(18px * var(--sutra-font-scale));
  color: var(--ink-3);
  letter-spacing: 0;
  line-height: 1.3;
}
#subtitle:empty { display: none; }
#titleMeta {
  margin-top: 22px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 13.5px;
  color: var(--ink-3);
  letter-spacing: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}
#titleMeta:empty { display: none; }
#titleMeta .sep {
  color: var(--ink-4);
  font-style: normal;
  font-size: 11px;
}
#titleMeta b {
  color: var(--ink-2);
  font-style: normal;
  font-weight: 400;
}

/* ============================================================
   Reader scroll area — title + content cuộn chung
   ============================================================ */
#readerArea {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  background: transparent;
  /* KHÔNG dùng scroll-behavior: smooth ở đây — sẽ làm scrollTop=0 programmatic
     bị animate, và khi đổi bài kinh, trình duyệt có thể giữ vị trí cuộn cũ
     (overflow-anchor) rồi "trượt mượt" về đầu → gây cảm giác vị trí bài cũ bị carry over. */
  scroll-behavior: auto;
  overflow-anchor: none;
  display: flex;
  flex-direction: column;
}
#readerArea::-webkit-scrollbar { width: 8px; }
#readerArea::-webkit-scrollbar-track { background: transparent; }
#readerArea::-webkit-scrollbar-thumb {
  background: color-mix(in oklab, var(--ink-4) 50%, transparent);
  border-radius: 999px;
}
#readerArea::-webkit-scrollbar-thumb:hover { background: var(--accent); }

#sutraGrid {
  flex: 0 0 auto;
  overflow: visible;
  padding: 24px 32px 48px;
  display: flex;
  flex-direction: column;
  gap: 36px;
  background: transparent;
}

.sutra-row-wrap {
  display: flex;
  flex-direction: column;
  position: relative;
  max-width: 1040px;
  width: 100%;
  margin: 0 auto;
  padding-left: 20px;
}
.sutra-row-wrap::before {
  content: "";
  position: absolute;
  left: 0; top: 4px; bottom: 0;
  width: 1px;
  background: var(--rule-2);
  opacity: 0.7;
  transition: background .2s, opacity .2s;
}
.sutra-row-wrap:hover::before { background: color-mix(in oklab, var(--accent) 50%, var(--rule-2)); }

/* Ornament divider every 8 segments for reading rhythm
   (loại trừ sub-sutta heading — nó tự có dấu phân cách riêng) */
.sutra-row-wrap:nth-of-type(8n+1):not(:first-of-type):not(.is-subtitle) { margin-top: 22px; }
.sutra-row-wrap:nth-of-type(8n+1):not(:first-of-type):not(.is-subtitle)::after {
  content: '❦';
  position: absolute;
  top: -26px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--serif);
  font-size: 14px;
  color: var(--accent);
  opacity: 0.32;
  letter-spacing: 0;
  line-height: 1;
  pointer-events: none;
  user-select: none;
}

/* Sub-sutta heading: khi row có data-key kết thúc ":0.3" (vd "sn1.11:0.3")
   → xử lý như tiêu đề phụ của sub-sutta trong vagga bundle */
.sutra-row-wrap.is-subtitle {
  margin-top: 36px;
  padding-top: 14px;
  padding-left: 0;
}
/* Sub-sutta đầu tiên của bài (ngay dưới header) không cần đẩy xuống nhiều */
.sutra-row-wrap.is-subtitle:first-of-type {
  margin-top: 0;
  padding-top: 4px;
}
.sutra-row-wrap.is-subtitle::before { display: none; }
.sutra-row-wrap.is-subtitle .sutra-seg-key { display: none; }
.sutra-row-wrap.is-subtitle::after {
  content: '·';
  position: absolute;
  top: -2px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: var(--accent);
  opacity: 0.45;
  letter-spacing: 0.4em;
  line-height: 1;
  pointer-events: none;
}
.sutra-row-wrap.is-subtitle:first-of-type::after { display: none; }
.sutra-row-wrap.is-subtitle .sutra-row {
  grid-template-columns: 1fr !important;
  grid-template-areas: none !important;
  row-gap: 2px;
  text-align: center;
}
.sutra-row-wrap.is-subtitle .sutra-col { grid-area: auto !important; align-items: center; }
.sutra-row-wrap.is-subtitle .sutra-col-header { display: none; }
.sutra-row-wrap.is-subtitle .pali {
  font-family: var(--serif-pali);
  font-style: italic;
  font-weight: 400;
  font-size: calc(18px * var(--sutra-font-scale));
  color: var(--ink);
  line-height: 1.25;
  text-align: center;
}
.sutra-row-wrap.is-subtitle .eng,
.sutra-row-wrap.is-subtitle .vie {
  font-family: var(--serif);
  font-style: italic;
  font-size: calc(12.5px * var(--sutra-font-scale));
  color: var(--ink-3);
  text-align: center;
  line-height: 1.3;
}
.sutra-row-wrap.is-subtitle .vie { font-family: var(--serif-vi); }

.sutra-seg-key {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  color: var(--ink-4);
  padding: 0 0 10px 0;
  user-select: none;
  text-transform: uppercase;
}

.sutra-row {
  display: grid;
  grid-template-columns: repeat(var(--visible-cols), 1fr);
  gap: 32px;
  min-width: 0;
  background: transparent;
  border: none;
  border-radius: 0;
  overflow: visible;
  box-shadow: none;
  transition: background .2s, box-shadow .2s;
  padding: 0;
  align-items: start;
}
.sutra-row:hover { }
.sutra-row.reading {
  background: var(--highlight);
  box-shadow: -20px 0 0 var(--highlight), 20px 0 0 var(--highlight);
}
.sutra-row.reading ~ .sutra-row.reading { /* keep effect */ }

.sutra-col {
  min-width: 0;
  word-break: break-word;
  overflow-wrap: break-word;
  display: flex;
  flex-direction: column;
  border: none;
  background: transparent;
}
.sutra-col-header {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: var(--ink-4);
  padding: 0 0 6px 0;
  background: transparent;
  user-select: none;
  flex-shrink: 0;
  text-transform: uppercase;
  border-bottom: 1px solid var(--rule-2);
  margin-bottom: 10px;
  align-self: flex-start;
}
.sutra-col-body {
  padding: 0;
  flex: 1;
}

.pali {
  font-family: var(--serif-pali);
  font-style: italic;
  font-size: calc(19px * var(--sutra-font-scale));
  font-weight: 400;
  color: var(--ink);
  line-height: var(--sutra-line-height);
  letter-spacing: 0.003em;
  font-feature-settings: "liga", "kern";
}
.eng, .vie {
  font-family: var(--serif);
  font-weight: 400;
  font-size: calc(16px * var(--sutra-font-scale));
  line-height: var(--sutra-line-height);
  color: var(--ink-2);
}
.vie { font-family: var(--serif-vi); }

/* Three-column: span Pali full-width on top, En+Vi below — ONLY when not stacked
   (scoping with :not(.stack) prevents named grid-area leakage into stack mode) */
.card:not(.stack) #sutraGrid:not(.hide-pali):not(.hide-eng):not(.hide-vie) .sutra-row {
  grid-template-columns: 1fr 1fr;
  grid-template-areas:
    "pali pali"
    "eng  vie";
  column-gap: 40px;
  row-gap: 22px;
}
.card:not(.stack) #sutraGrid:not(.hide-pali):not(.hide-eng):not(.hide-vie) .pali-col { grid-area: pali; }
.card:not(.stack) #sutraGrid:not(.hide-pali):not(.hide-eng):not(.hide-vie) .eng-col  { grid-area: eng; }
.card:not(.stack) #sutraGrid:not(.hide-pali):not(.hide-eng):not(.hide-vie) .vie-col  { grid-area: vie; }
.card:not(.stack) #sutraGrid:not(.hide-pali):not(.hide-eng):not(.hide-vie) .pali-col .pali {
  font-size: calc(22px * var(--sutra-font-scale));
  line-height: calc(var(--sutra-line-height) * 0.92);
}

/* Hide columns */
.hide-pali .pali-col,
.hide-eng .eng-col,
.hide-vie .vie-col { display: none; }

/* Only-one-language: full width, hide headers/keys */
#sutraGrid.hide-eng.hide-vie .sutra-row,
#sutraGrid.hide-pali.hide-eng .sutra-row,
#sutraGrid.hide-pali.hide-vie .sutra-row {
  grid-template-columns: 1fr !important;
  grid-template-areas: none !important;
}
#sutraGrid.hide-eng.hide-vie .sutra-col-header,
#sutraGrid.hide-pali.hide-eng .sutra-col-header,
#sutraGrid.hide-pali.hide-vie .sutra-col-header,
#sutraGrid.hide-eng.hide-vie .sutra-seg-key,
#sutraGrid.hide-pali.hide-eng .sutra-seg-key,
#sutraGrid.hide-pali.hide-vie .sutra-seg-key { display: none; }
#sutraGrid.hide-eng.hide-vie .pali,
#sutraGrid.hide-pali.hide-eng .vie,
#sutraGrid.hide-pali.hide-vie .eng {
  line-height: calc(var(--sutra-line-height) + 0.05);
  text-align: justify;
  text-justify: inter-word;
  hyphens: auto;
  -webkit-hyphens: auto;
}

/* Stack mode (toàn bộ cột 1fr) cũng nên justify 2 bên cho gọn gàng */
.card.stack .pali,
.card.stack .eng,
.card.stack .vie {
  text-align: justify;
  text-justify: inter-word;
}

/* Stack layout — force single column and reset any lingering grid-area */
.card.stack .sutra-row {
  grid-template-columns: 1fr !important;
  grid-template-areas: none !important;
  row-gap: 16px;
  column-gap: 0;
}
.card.stack .sutra-col,
.card.stack .pali-col,
.card.stack .eng-col,
.card.stack .vie-col {
  grid-area: auto !important;
  grid-column: 1 / -1 !important;
  grid-row: auto !important;
  border-bottom: none;
}
.card.stack .sutra-col-header { margin-bottom: 6px; }
.card.stack .pali { font-size: calc(20px * var(--sutra-font-scale)); }

/* Segment visibility toggles (from Settings) */
html.hide-seg-key .sutra-seg-key { display: none !important; }
html.hide-seg-hdr .sutra-col-header { display: none !important; }
html.hide-seg-hdr .pali,
html.hide-seg-hdr .eng,
html.hide-seg-hdr .vie { margin-top: 0; }

/* ============================================================
   Welcome screen — dhamma wheel + recommendations
   ============================================================ */
.welcome-screen {
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  padding: 12px 8px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}
.welcome-ornament {
  width: 88px;
  height: 88px;
  color: var(--accent);
  opacity: 0.75;
  flex-shrink: 0;
  display: block;
  margin-top: 8px;
}

/* Welcome dedication — 3 câu Pāli + dịch nghĩa, căn giữa, phân cách nhẹ */
.welcome-dedication {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 20px 24px;
  border-top: 1px solid var(--rule-2);
  border-bottom: 1px solid var(--rule-2);
  text-align: center;
}
.welcome-dedication .ded-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.welcome-dedication .ded-pali {
  font-family: var(--serif-pali);
  font-style: italic;
  font-weight: 400;
  font-size: 16px;
  color: var(--accent);
  line-height: 1.4;
  letter-spacing: 0.005em;
}
.welcome-dedication .ded-tr {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink-3);
  font-style: italic;
  line-height: 1.4;
}
.welcome-ornament .wheel-rim,
.welcome-ornament .wheel-hub,
.welcome-ornament .wheel-spoke {
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
}
.welcome-ornament .wheel-hub { fill: currentColor; stroke: none; }
.welcome-box {
  max-width: 560px;
  width: 100%;
  padding: 24px 30px;
  font-family: var(--serif);
  font-size: 16px;
  line-height: 1.75;
  color: var(--ink-2);
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--panel);
  text-align: left;
  position: relative;
  box-shadow: 0 1px 4px color-mix(in oklab, var(--ink) 4%, transparent);
}
.welcome-box strong {
  font-family: var(--serif);
  font-weight: 500;
  font-style: italic;
  color: var(--ink);
  font-size: 18px;
  display: block;
  margin-bottom: 6px;
}
.welcome-box .kbd-hint {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--rule-2);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  line-height: 1.8;
}
.welcome-box .kbd-hint kbd {
  font-family: var(--mono);
  font-size: 10.5px;
  padding: 1px 6px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  background: var(--bg-2);
  color: var(--ink-2);
  margin: 0 2px;
}

.rec-title {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  align-self: flex-start;
  margin-left: 4px;
}
.rec-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 10px;
  width: 100%;
  max-width: 600px;
}
.rec-card {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 14px;
  align-items: center;
  padding: 12px 16px;
  background: var(--panel);
  border: 1px solid var(--rule);
  border-radius: 4px;
  color: var(--ink);
  cursor: pointer;
  font-family: var(--serif);
  text-align: left;
  transition: all .15s;
}
.rec-card:hover {
  border-color: var(--accent);
  background: color-mix(in oklab, var(--accent) 5%, var(--panel));
  transform: translateY(-1px);
}
.rec-card .rec-code {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--accent);
  white-space: nowrap;
}
.rec-card .rec-name {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}
.rec-card .rec-name-main {
  font-style: italic;
  font-size: 14.5px;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rec-card .rec-name-sub {
  font-size: 12px;
  color: var(--ink-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ============================================================
   Epigraph — dải lời kinh mỏng DƯỚI footer, 1 màu (ink-3 unified)
   ============================================================ */
.epigraph {
  flex: 0 0 auto;
  background: var(--bg);
  border-top: 1px solid var(--rule-2);
  padding: 3px 16px 4px;
  text-align: center;
  position: relative;
  z-index: 6;
  line-height: 1.3;
  color: var(--ink-3);
}
.epigraph-inner {
  display: inline-flex;
  align-items: baseline;
  gap: 8px;
  max-width: 100%;
  flex-wrap: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  justify-content: center;
  transition: opacity .45s ease;
  will-change: opacity;
}
.ep-pali {
  font-family: var(--serif-pali);
  font-style: italic;
  font-weight: 400;
  font-size: 11.5px;
  color: inherit;
  flex-shrink: 0;
}
.ep-sep {
  color: inherit;
  font-size: 11px;
  opacity: 0.5;
  flex-shrink: 0;
}
.ep-tr {
  font-family: var(--serif);
  font-style: italic;
  font-size: 11.5px;
  color: inherit;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.ep-cite {
  background: none;
  border: 0;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: inherit;
  cursor: pointer;
  padding: 0 4px;
  opacity: 0.75;
  transition: color .15s, opacity .15s;
  flex-shrink: 0;
}
.ep-cite::before { content: "— "; opacity: 0.6; }
.ep-cite:hover {
  color: var(--accent);
  opacity: 1;
}
.ep-cite:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* ============================================================
   Reading progress bar (above status footer)
   ============================================================ */
.reading-progress {
  flex: 0 0 auto;
  height: 2px;
  width: 100%;
  background: transparent;
  position: relative;
  z-index: 8;
  overflow: hidden;
}
.reading-progress-fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, color-mix(in oklab, var(--accent) 60%, transparent), var(--accent));
  transition: width 0.18s ease;
  will-change: width;
}

/* Active segment (the one centered in the viewport while scrolling) */
.sutra-row-wrap.current::before {
  background: var(--accent) !important;
  opacity: 1 !important;
  width: 2px;
}
.sutra-row-wrap.current .sutra-seg-key {
  color: var(--accent);
  opacity: 1;
}

/* ============================================================
   Bottom status bar (Library · Prev/Title/Next · Settings)
   ============================================================ */
.status {
  flex: 0 0 auto;
  position: relative;
  z-index: 9;
  background: color-mix(in oklab, var(--bg) 88%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--rule);
}
.status-in {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 8px 24px;
  gap: 16px;
}
.status-left, .status-right {
  display: flex;
  gap: 8px;
  align-items: center;
}
.status-right { justify-self: end; }

.status-center {
  display: flex;
  align-items: stretch;
  justify-content: center;
  gap: 0;
  height: 34px;
  min-width: 0;
}
.status-title {
  display: flex;
  align-items: center;
  padding: 0 18px;
  font-family: var(--serif);
  font-style: italic;
  color: var(--ink-2);
  font-size: 15px;
  letter-spacing: 0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  max-width: 50vw;
  cursor: pointer;
  transition: color .15s, background .15s;
}
.status-title:hover {
  color: var(--ink);
  background: color-mix(in oklab, var(--accent) 6%, transparent);
}

/* Bar pill buttons (Library / Settings) — borderless để nhẹ như Prev/Next */
.bar-pill {
  background: none;
  border: 0;
  padding: 0 12px;
  color: var(--ink-3);
  font-family: var(--mono);
  font-size: 11.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 0;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 34px;
  transition: color .15s, background .15s;
}
.bar-pill svg {
  width: 13px; height: 13px;
  color: var(--ink-3);
  opacity: 0.9;
  flex-shrink: 0;
  transition: color .15s;
}
.bar-pill:hover {
  color: var(--ink);
}
.bar-pill:hover svg {
  color: var(--accent);
  opacity: 1;
}
.bar-pill.is-open,
.bar-pill.active {
  color: var(--ink);
}
.bar-pill.is-open svg,
.bar-pill.active svg {
  color: var(--accent);
  opacity: 1;
}
.bar-pill .sidebar-arrow { display: none; }

/* Prev/Next nav pills */
.nav-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: none;
  border: 0;
  color: var(--ink-3);
  font-family: var(--mono);
  font-size: 11.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0 14px;
  border-radius: 0;
  height: 34px;
  transition: color .15s;
}
.nav-pill:disabled { opacity: 0.25; cursor: default; }
.nav-pill:not(:disabled):hover { color: var(--ink); }
.nav-pill:not(:disabled):hover svg { color: var(--accent); }
.nav-pill svg {
  width: 12px; height: 12px;
  color: var(--ink-3);
  transition: color .15s, transform .2s;
}
#btnPrev:not(:disabled):hover svg { transform: translateX(-2px); }
#btnNext:not(:disabled):hover svg { transform: translateX(2px); }

/* Back to top button — nhẹ và thanh mảnh */
#btnBackTop {
  position: absolute;
  right: 20px;
  bottom: 66px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: color-mix(in oklab, var(--panel) 92%, transparent);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid color-mix(in oklab, var(--ink-3) 30%, transparent);
  color: var(--ink-3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(6px) scale(.94);
  pointer-events: none;
  transition: opacity .22s, transform .22s, border-color .15s, color .15s, background .15s;
  z-index: 15;
  box-shadow: 0 2px 10px color-mix(in oklab, var(--ink) 6%, transparent);
}
#btnBackTop svg { width: 12px; height: 12px; }
#btnBackTop.visible {
  opacity: 0.92;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}
#btnBackTop:hover {
  opacity: 1;
  color: var(--accent);
  border-color: var(--accent);
}
#btnBackTop:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ============================================================
   Modal scrim (for library panel open)
   ============================================================ */
.modal-scrim {
  position: fixed;
  inset: 0;
  background: color-mix(in oklab, var(--bg) 70%, transparent);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 55;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
body:has(#sutraMenuPanel.open) .modal-scrim { opacity: 1; pointer-events: auto; }

/* ============================================================
   Panels (library + settings)
   ============================================================ */
.panel {
  position: fixed;
  background: var(--panel);
  border: 1px solid var(--rule);
  border-radius: 6px;
  box-shadow: 0 24px 60px color-mix(in oklab, var(--ink) 30%, transparent);
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s, transform .22s;
  font-family: var(--serif);
}
[data-theme="dark"] .panel {
  box-shadow: 0 24px 60px rgba(0,0,0,0.55);
}

/* Library modal (#sutraMenuPanel) */
#sutraMenuPanel {
  top: 50% !important;
  left: 50% !important;
  right: auto !important;
  bottom: auto !important;
  transform: translate(-50%, -48%) scale(0.98) !important;
  width: min(720px, calc(100vw - 40px));
  max-width: none;
  max-height: 80vh;
  min-width: 0;
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow: hidden;
  border-radius: 6px;
}
#sutraMenuPanel.open {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1) !important;
}
#sutraMenuPanel .search-box {
  padding: 18px 22px 10px;
  border-bottom: 1px solid var(--rule);
  flex: 0 0 auto;
  background: var(--panel);
}
#sutraSearch {
  width: 100%;
  padding: 10px 12px;
  font-family: var(--serif);
  font-size: 16px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: var(--bg-2);
  color: var(--ink);
  outline: 0;
  transition: border-color .15s, box-shadow .15s;
}
#sutraSearch:focus {
  border-color: var(--accent);
  background: var(--panel);
  box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 15%, transparent);
}
#sutraSearch::placeholder { color: var(--ink-4); font-style: italic; }

#sutraSearchResults {
  padding: 0 22px;
  max-height: 220px;
  overflow-y: auto;
  flex: 0 0 auto;
}
#sutraSearchResults:empty { display: none; }
.search-result-item {
  width: 100%;
  text-align: left;
  background: none;
  border: 0;
  padding: 9px 4px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  color: var(--ink);
  font-family: var(--serif);
  border-bottom: 1px solid var(--rule-2);
  cursor: pointer;
  transition: background .12s;
}
.search-result-item:hover { background: var(--highlight); }
.search-result-item .search-main,
.search-result-item .sr-main {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
}
.search-result-item .search-sub,
.search-result-item .sr-sub {
  font-size: 13px;
  color: var(--ink-3);
  font-style: italic;
}
.search-result-item mark {
  background: color-mix(in oklab, var(--accent) 18%, transparent);
  color: var(--ink);
  padding: 0 2px;
  border-radius: 2px;
}
.search-result-empty {
  padding: 10px 4px;
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: var(--ink-4);
}

#sutraMenuList {
  list-style: none;
  margin: 0;
  /* padding-top = 0 để sticky nikaya header dính sát cạnh trên, không để content "lọt qua khe" */
  padding: 0 0 12px;
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  border-top: 1px solid var(--rule-2);
}
#sutraMenuList::-webkit-scrollbar { width: 6px; }
#sutraMenuList::-webkit-scrollbar-track { background: transparent; }
#sutraMenuList::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--ink-4) 40%, transparent); border-radius: 999px; }

.menu-block {
  padding: 0;
  border-bottom: 1px solid var(--rule-2);
}
.menu-block:last-child { border-bottom: none; }
/* Nikaya header — sticky phía trên menu list, click để thu/mở.
   Background OPAQUE (không dùng var(--highlight) trong trạng thái sticky vì nó có alpha). */
.menu-block > .menu-toggle:not(.nested) {
  background-color: var(--panel);
  border: 0;
  border-bottom: 1px solid var(--rule-2);
  width: 100%;
  text-align: left;
  cursor: pointer;
  padding: 12px 50px 12px 18px;
  position: sticky;
  top: 0;
  z-index: 5;
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background-color .12s, box-shadow .2s;
}
/* Khi nikaya đang mở (aria-expanded=true) → shadow nhẹ để tách khỏi content cuộn */
.menu-block > .menu-toggle:not(.nested)[aria-expanded="true"] {
  background-color: color-mix(in oklab, var(--accent) 8%, var(--panel));
  box-shadow: 0 2px 8px color-mix(in oklab, var(--ink) 10%, transparent);
}
.menu-block > .menu-toggle:not(.nested):hover {
  background-color: color-mix(in oklab, var(--accent) 12%, var(--panel));
  color: var(--ink);
}
.menu-block > .menu-toggle:not(.nested) .chevron,
.menu-toggle.nested .chevron {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  opacity: 0.65;
}
.chevron { display: inline-block; }

.menu-list { margin: 0; padding: 0; }
.menu-list.collapsed { display: none; }

.menu-nikaya-sticky {
  display: none;
}

.menu-subblock {
  padding: 0;
}
/* Group header (Chủ đề 1, Nhóm Một Pháp...) — KHÔNG sticky (tránh chồng lấp với nikaya sticky).
   Cùng font & padding như nikaya header để nhìn thống nhất, phân biệt bằng màu + indent. */
.menu-toggle.nested {
  background: none;
  border: 0;
  border-top: 1px dashed var(--rule-2);
  width: 100%;
  text-align: left;
  cursor: pointer;
  padding: 12px 40px 12px 38px;
  position: relative;
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-2);
  transition: background .12s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.menu-toggle.nested:hover { background: var(--highlight); color: var(--ink); }
.menu-toggle.nested::before {
  content: '▸';
  position: absolute;
  left: 22px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  color: var(--accent);
  opacity: 0.8;
}
.menu-toggle.nested[aria-expanded="true"]::before { content: '▾'; }

.menu-subblock .chapter-toggle {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13.5px;
  color: var(--ink-3);
  padding: 4px 0 4px 16px;
  position: relative;
}
.menu-subblock .chapter-toggle::before {
  content: '—';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--accent);
  opacity: 0.7;
}

.menu-sutta-link {
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 10px;
  align-items: baseline;
  /* Mức indent 1: bài kinh trực tiếp dưới Nikaya (DN / MN) — khớp với cột nested toggle 38px */
  padding: 4px 22px 4px 38px;
  text-decoration: none;
  color: var(--ink);
  border-top: 1px solid var(--rule-2);
  cursor: pointer;
  transition: background .12s;
  position: relative;
}
/* Defensive: nếu JS cũ không render .sutra-code, layout vẫn không vỡ */
.menu-sutta-link:not(:has(.sutra-code)) {
  grid-template-columns: 1fr;
  padding-left: 38px;
}
/* Mức indent 2: bài kinh lồng trong group (SN / AN) — thụt vào thêm 1 tab */
.menu-subblock .menu-sutta-link {
  padding-left: 54px;
}
.menu-sutta-link:hover { background: var(--bg-2); }
.menu-sutta-link.active {
  background: color-mix(in oklab, var(--accent) 14%, transparent);
}
.menu-sutta-link.active::before {
  content: "";
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 18px;
  border-radius: 2px;
  background: var(--accent);
}
.menu-subblock .menu-sutta-link.active::before {
  left: 36px;
}
.sutra-code {
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--accent);
  white-space: nowrap;
  line-height: 1.4;
  text-align: left;
  padding-top: 2px;
  opacity: 0.9;
}
.menu-sutta-link.active .sutra-code { color: var(--accent); opacity: 1; }
.sutra-label {
  display: flex;
  flex-direction: column;
  gap: 0;
  min-width: 0;
}
.sutra-label-main {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.2;
}
.sutra-label-sub {
  font-family: var(--serif);
  font-size: 12.5px;
  font-style: normal;
  color: var(--ink-3);
  line-height: 1.2;
}
.menu-sutta-link.active .sutra-label-main,
.menu-sutta-link.active .sutra-label-sub { color: var(--ink); }

/* Library modal accent strip */
#sutraMenuPanel::before {
  content: "";
  display: block;
  height: 2px;
  flex: 0 0 auto;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.85;
}

/* ============================================================
   Settings panel (#settingsPanel)
   ============================================================ */
#settingsPanel {
  position: fixed !important;
  right: 24px !important;
  bottom: 62px !important;
  left: auto !important;
  top: auto !important;
  width: min(320px, calc(100vw - 32px));
  max-height: min(72vh, 640px);
  padding: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transform: translateY(10px);
}
#settingsPanel.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
#settingsPanel .set-panel-header {
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--rule);
  flex: 0 0 auto;
  background: var(--panel);
  position: relative;
}
#settingsPanel .panel-title {
  margin: 0;
  padding: 0;
  border: none;
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-3);
  text-align: left;
}
#settingsPanel .set-panel-body {
  padding: 14px 18px 18px;
  overflow-y: auto;
  overflow-x: hidden;
  flex: 1 1 auto;
  -webkit-overflow-scrolling: touch;
}
#settingsPanel .set-panel-body::-webkit-scrollbar { width: 4px; }
#settingsPanel .set-panel-body::-webkit-scrollbar-track { background: transparent; }
#settingsPanel .set-panel-body::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--ink-4) 40%, transparent); border-radius: 999px; }

#settingsPanel .set-sec {
  margin-bottom: 16px;
  padding: 0;
  border-radius: 0;
  border: none;
  background: transparent;
  overflow: visible;
}
#settingsPanel .set-sec:last-child { margin-bottom: 0; }
#settingsPanel .set-sec-hd {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  padding: 0 0 8px 0;
  background: transparent;
  border-bottom: 1px solid var(--rule-2);
  margin-bottom: 10px;
}
#settingsPanel .set-sec-title {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  line-height: 1.2;
}
#settingsPanel .set-sec-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12.5px;
  color: var(--ink-4);
  line-height: 1.2;
}
#settingsPanel .set-sec-body {
  padding: 0;
}

/* Seg-ctrl style for pills */
#settingsPanel .set-pills {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: 3px;
  overflow: hidden;
}
#settingsPanel .set-pills.cols-3 { grid-template-columns: repeat(3, 1fr); }

#settingsPanel .pill {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 36px;
  padding: 7px 8px;
  border: 0;
  border-right: 1px solid var(--rule);
  background: transparent;
  color: var(--ink-3);
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .12s;
  line-height: 1.2;
}
#settingsPanel .pill:last-child { border-right: 0; }
#settingsPanel .pill:hover { background: var(--highlight); color: var(--ink); }
#settingsPanel .pill.active,
#settingsPanel .pill[aria-pressed="true"] {
  background: var(--accent);
  color: var(--bg);
}
#settingsPanel .pill-wide { text-transform: uppercase; letter-spacing: 0.08em; }
#settingsPanel .pill-icon { font-size: 12px; margin-right: 4px; opacity: 0.9; }

/* Sliders */
.slider-row {
  margin-bottom: 12px;
}
.slider-row:last-child { margin-bottom: 0; }
.slider-label-row {
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.set-mini-label {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  line-height: 1.2;
}
.slider-value-badge {
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--accent);
  background: color-mix(in oklab, var(--accent) 10%, transparent);
  border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
  border-radius: 2px;
  padding: 1px 7px;
  min-width: 44px;
  text-align: center;
  letter-spacing: 0.02em;
}
.slider-track-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sutra-slider {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 3px;
  border-radius: 999px;
  background: linear-gradient(to right,
    var(--accent) 0,
    var(--accent) var(--slider-pct, 25%),
    var(--rule) var(--slider-pct, 25%),
    var(--rule) 100%);
  outline: 0;
  cursor: pointer;
  border: 0;
  margin: 0;
}
.sutra-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--panel);
  box-shadow: 0 1px 4px color-mix(in oklab, var(--ink) 20%, transparent);
  cursor: pointer;
}
.sutra-slider::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--panel);
  box-shadow: 0 1px 4px color-mix(in oklab, var(--ink) 20%, transparent);
  cursor: pointer;
}
.sutra-slider:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
.slider-reset-btn {
  background: transparent !important;
  border: 1px solid var(--rule) !important;
  color: var(--ink-4) !important;
  font-family: var(--mono) !important;
  font-size: 12px !important;
  width: 24px !important; height: 24px !important;
  padding: 0 !important;
  border-radius: 2px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  cursor: pointer;
  flex-shrink: 0;
  transition: color .15s, border-color .15s, transform .3s !important;
}
.slider-reset-btn:hover {
  color: var(--accent) !important;
  border-color: var(--accent) !important;
  transform: rotate(-60deg) !important;
}

/* TTS */
#settingsPanel .tts-bar {
  display: flex;
  gap: 6px;
  margin-top: 2px;
}
#settingsPanel .tts-btn {
  flex: 1;
  height: 36px;
  padding: 0;
  border-radius: 2px;
  border: 1px solid var(--rule);
  background: var(--bg-2);
  color: var(--ink-3);
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .12s;
}
#settingsPanel .tts-btn:disabled { opacity: 0.3; cursor: default; }
#settingsPanel .tts-btn:not(:disabled):hover {
  color: var(--ink);
  border-color: var(--accent);
  background: var(--highlight);
}
#settingsPanel .set-note {
  margin-top: 10px;
  color: var(--ink-4);
  font-family: var(--serif);
  font-size: 13px;
  line-height: 1.5;
  font-style: italic;
}

/* ============================================================
   Guide overlay
   ============================================================ */
#guideOverlay {
  position: fixed;
  inset: 0;
  background: color-mix(in oklab, var(--ink) 55%, transparent);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1100;
}
#guideOverlay.show { display: flex; }
.guide-dialog {
  background: var(--panel);
  border: 1px solid var(--rule);
  border-radius: 6px;
  box-shadow: 0 40px 100px color-mix(in oklab, var(--ink) 40%, transparent);
  padding: 24px 26px 20px;
  max-width: 480px;
  width: 92%;
  max-height: 80vh;
  overflow-y: auto;
  font-family: var(--serif);
  font-size: 16px;
  color: var(--ink);
  position: relative;
}
.guide-dialog h2 {
  margin: 0 0 8px;
  font-family: var(--serif);
  font-weight: 300;
  font-style: italic;
  font-size: 22px;
  color: var(--ink);
  letter-spacing: 0;
  text-transform: none;
  text-align: left;
}
.guide-dialog em {
  display: block;
  font-size: 14px;
  color: var(--ink-3);
  font-style: italic;
  margin: 0 0 14px;
}
.guide-dialog ul {
  padding-left: 20px;
  line-height: 1.7;
  margin: 0 0 8px;
}
.guide-dialog li { margin-bottom: 8px; }
.guide-dialog li::marker { color: var(--accent); }
.guide-dialog button {
  margin-top: 12px;
  float: right;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  padding: 6px 18px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-2);
  cursor: pointer;
  border-radius: 2px;
  transition: all .15s;
}
.guide-dialog button:hover { color: var(--ink); border-color: var(--accent); }
.guide-dialog kbd {
  font-family: var(--mono);
  font-size: 10.5px;
  padding: 1px 6px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  background: var(--bg-2);
  color: var(--ink-2);
  letter-spacing: 0;
}
.guide-dialog code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--bg-2);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--accent);
}

/* ============================================================
   Mobile adjustments
   ============================================================ */
/* Hide Prev/Next text earlier than the full mobile breakpoint */
@media (max-width: 960px) {
  .nav-pill .nav-label { display: none; }
  .nav-pill { padding: 0 10px; }
  .bar-pill { padding: 0 10px; gap: 0; }
  .bar-pill span.label-full { display: none; }
  .bar-pill svg { width: 14px; height: 14px; }
}

@media (max-width: 720px) {
  .bar-center::before, .bar-center::after { display: none; }
  .bar-center { font-size: 11px; letter-spacing: 0.12em; gap: 0; }
  .bar-in { padding: 10px 14px; gap: 10px; }
  .bar-right { gap: 0; }
  .header { padding: 24px 22px 20px; }
  #title { font-size: calc(26px * var(--sutra-font-scale)); }
  #subtitle { font-size: calc(14px * var(--sutra-font-scale)); }
  #supertitle { font-size: 9.5px; letter-spacing: 0.22em; margin-bottom: 8px; }
  #titleMeta { margin-top: 12px; font-size: 11.5px; }
  #sutraGrid { padding: 26px 18px 26px; gap: 28px; }
  .sutra-row-wrap { padding-left: 14px; }

  /* Mobile: luôn stack 1 cột — cho mọi cấu hình ngôn ngữ */
  .sutra-row,
  #sutraGrid:not(.hide-pali):not(.hide-eng):not(.hide-vie) .sutra-row {
    grid-template-columns: 1fr !important;
    grid-template-areas: none !important;
    row-gap: 14px;
    column-gap: 0;
  }
  .pali-col, .eng-col, .vie-col, .sutra-col {
    grid-area: auto !important;
    grid-column: 1 / -1 !important;
    grid-row: auto !important;
    border-bottom: none;
  }
  /* Stack polish: header gọn hơn, Pāli lớn lên, justify 2 bên */
  .sutra-col-header { margin-bottom: 6px; }
  .pali { font-size: calc(19px * var(--sutra-font-scale)); }
  .pali, .eng, .vie { text-align: justify; text-justify: inter-word; }
  /* Mobile đã tự stack → ẩn luôn nút "Xếp dọc" trong Settings */
  #layoutRow { display: none !important; }

  .status-in { padding: 6px 8px; gap: 6px; grid-template-columns: auto 1fr auto; }
  .status-title { font-size: 13px; padding: 0 10px; max-width: 55vw; }
  .nav-pill { padding: 0 6px; }
  .bar-pill { padding: 0 8px; }
  .epigraph { padding: 3px 10px; }
  .ep-pali { font-size: 11px; }
  .ep-tr { font-size: 11px; }
  .ep-cite { font-size: 9.5px; padding: 0 3px; }
  .epigraph-inner { gap: 6px; }
  #sutraMenuPanel { width: calc(100vw - 20px); max-height: 86vh; }
  #settingsPanel { right: 10px !important; bottom: 56px !important; width: calc(100vw - 20px); }
  #btnBackTop { right: 14px; bottom: 62px; width: 38px; height: 38px; }
}

@media (max-width: 500px) {
  .bar-in { padding: 8px 12px; }
  .header { padding: 22px 18px 18px; }
  #title { font-size: calc(24px * var(--sutra-font-scale)); }
  #subtitle { font-size: calc(14px * var(--sutra-font-scale)); }
  .eng, .pali, .vie { text-align: left; }
  input[type="search"], input[type="text"], input[type="email"], textarea, select { font-size: 16px !important; }
  .menu-sutta-link, .menu-toggle, a, button, input, select, textarea { touch-action: manipulation; }
}

/* ============================================================
   Accessibility + motion
   ============================================================ */
button:not(:focus-visible), a:not(:focus-visible),
.menu-sutta-link:not(:focus-visible), .menu-toggle:not(:focus-visible) { outline: 0; }
.bar-icon-btn:focus-visible, .bar-pill:focus-visible, .nav-pill:focus-visible,
.pill:focus-visible, #sutraSearch:focus-visible, .sutra-slider:focus-visible,
.tts-btn:focus-visible, .slider-reset-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}

/* Keep the transition smooth on theme toggle */
@media (prefers-reduced-motion: no-preference) {
  html, body, .top-bar, .status, .header, .panel, .guide-dialog, #sutraGrid,
  .sutra-row, #btnBackTop, .welcome-box, .menu-sutta-link, .sutra-col-header {
    transition: background-color .3s, color .3s, border-color .3s, box-shadow .3s;
  }
}

/* Compat: various classes still referenced by app.js CSS selectors */
.top-note-text, .top-note-actions, .footer-divider, .toolbar-btn, .toolbar-group,
.panel-row, .panel-label, .btn-circle, .btn-nav, .btn-flag, .footer-nav,
.bottom-controls, .nav-btn, .nav-title, .menu-btn, .menuIcon, .sr-only { }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }

#sutraGrid[aria-busy="true"]::after {
  content: "";
  display: block;
  align-self: center;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--rule);
  border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div class="app">
  <div class="card" id="card">

    <!-- TOP BAR: dedication + UI controls -->
    <header class="top-bar" role="banner">
      <div class="bar-in">
        <div class="bar-left">
          <button id="btnDarkMode" class="bar-icon-btn" aria-label="Chuyển sáng/tối" title="Chế độ tối">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
            </svg>
          </button>
        </div>
        <div class="bar-center"><span id="dedicationText" class="ded-phrase-text">Namo tassa bhagavato arahato sammāsambuddhassa</span></div>
        <div class="bar-right">
          <button id="btnUiLang" class="bar-icon-btn" aria-label="Đổi ngôn ngữ giao diện">
            <span class="lang-code">VI</span>
          </button>
          <button id="btnGuide" class="bar-icon-btn" aria-label="Hướng dẫn sử dụng" title="Guide">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 1.4-.9 2-1.6 2.4-.7.4-1.1.7-1.1 1.6v.4"></path>
              <path d="M12 16.2h.01"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- READER SCROLL AREA (title + content scroll together) -->
    <div id="readerArea">
      <section class="header" role="region" aria-label="Sutta title">
        <div id="supertitle"></div>
        <h1 id="title">Chưa chọn bài</h1>
        <div id="subtitle" class="vi" aria-live="polite">—</div>
        <div id="titleMeta"></div>
      </section>
      <main id="sutraGrid" role="main" aria-live="polite" aria-busy="false"></main>
    </div>

    <!-- READING PROGRESS -->
    <div class="reading-progress" aria-hidden="true">
      <div class="reading-progress-fill" id="readingProgressFill"></div>
    </div>

    <!-- BOTTOM STATUS BAR -->
    <footer class="status">
      <div class="status-in">
        <div class="status-left">
          <button type="button" id="sidebar-btn" class="bar-pill" title="Thư viện" aria-label="Mở danh mục bài kinh" aria-expanded="false">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" aria-hidden="true">
              <path d="M2 3v10M5 3v10M8 3v10M12 4l3 9M11 13h5"/>
            </svg>
            <span class="sidebar-label label-full" id="sidebarBtnLabel">Thư viện</span>
            <span class="sidebar-arrow" aria-hidden="true"></span>
          </button>
        </div>
        <div class="status-center">
          <button id="btnPrev" class="nav-pill" disabled aria-label="Bài trước">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 3L5 8l5 5"/></svg>
            <span class="nav-label" id="btnPrevLabel">Trước</span>
          </button>
          <span id="navTitle" class="status-title">—</span>
          <button id="btnNext" class="nav-pill" disabled aria-label="Bài tiếp theo">
            <span class="nav-label" id="btnNextLabel">Sau</span>
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3l5 5-5 5"/></svg>
          </button>
        </div>
        <div class="status-right">
          <button type="button" id="btnSettings" class="bar-pill" aria-label="Cài đặt hiển thị" aria-haspopup="true" aria-expanded="false" title="Settings">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" aria-hidden="true">
              <circle cx="8" cy="8" r="2"/>
              <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6L13 13M3 13l1.4-1.4M11.6 4.4L13 3"/>
            </svg>
            <span class="label-full" id="btnSettingsLabel">Cài đặt</span>
          </button>
        </div>
      </div>
    </footer>

    <!-- EPIGRAPH — dải lời kinh mỏng dưới cùng, 1 màu, click citation để mở bài kinh nguồn -->
    <aside class="epigraph" role="complementary" aria-label="Lời kinh">
      <div class="epigraph-inner">
        <span class="ep-pali" id="epPali"></span>
        <span class="ep-sep" aria-hidden="true">·</span>
        <span class="ep-tr" id="epTr"></span>
        <button class="ep-cite" id="epCite" type="button"></button>
      </div>
    </aside>

    <!-- BACK TO TOP -->
    <button id="btnBackTop" aria-label="Lên đầu trang" title="Back to top">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 13V3M3.5 7.5L8 3l4.5 4.5"/></svg>
    </button>

  </div><!-- /#card -->

  <!-- SCRIM for library modal -->
  <div class="modal-scrim" aria-hidden="true"></div>

  <!-- LIBRARY PANEL (Sutta menu) -->
  <div id="sutraMenuPanel" class="panel" role="dialog"
       aria-label="Danh mục bài kinh" aria-hidden="true" inert>
    <div class="search-box">
      <input id="sutraSearch" type="search"
             placeholder="Nhập tên bài kinh cần tìm..."
             aria-label="Tìm kiếm bài kinh" autocomplete="off">
    </div>
    <div id="sutraSearchResults" class="search-results" role="listbox" aria-label="Kết quả tìm kiếm"></div>
    <ul id="sutraMenuList" class="sutra-list" role="tree" aria-label="Mục lục bài kinh"></ul>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="settingsPanel" class="panel" aria-hidden="true" inert>
    <div class="set-panel-header">
      <div class="panel-title" id="settingsTitle">Tuỳ chỉnh</div>
    </div>
    <div class="set-panel-body">

      <!-- ① LANGUAGES -->
      <div class="set-sec">
        <div class="set-sec-hd">
          <span class="set-sec-title" id="settingsLangLabel">Ngôn ngữ</span>
          <span class="set-sec-sub" id="settingsLangSub">Hiện / ẩn cột</span>
        </div>
        <div class="set-sec-body">
          <div class="set-pills cols-3">
            <button class="pill active" id="btnPali" aria-pressed="true">Pāli</button>
            <button class="pill active" id="btnEng"  aria-pressed="true">English</button>
            <button class="pill active" id="btnVie"  aria-pressed="true">Việt</button>
          </div>
        </div>
      </div>

      <!-- ② LAYOUT -->
      <div class="set-sec" id="layoutRow">
        <div class="set-sec-hd">
          <span class="set-sec-title" id="settingsLayoutLabel">Bố cục</span>
        </div>
        <div class="set-sec-body">
          <div class="set-pills">
            <button class="pill pill-wide" id="btnLayout" aria-pressed="false">
              <span class="pill-icon">☰</span> Xếp dọc
            </button>
          </div>
        </div>
      </div>

      <!-- ③ SEGMENT -->
      <div class="set-sec" id="segmentRow">
        <div class="set-sec-hd">
          <span class="set-sec-title" id="settingsSegmentLabel">Phân đoạn</span>
          <span class="set-sec-sub" id="settingsSegmentSub">Hiện / ẩn</span>
        </div>
        <div class="set-sec-body">
          <div class="set-pills">
            <button class="pill pill-wide active" id="btnSegHdr" aria-pressed="true" title="Nhãn Pāli / English / Việt">
              <span class="pill-icon">▦</span> Segment
            </button>
            <button class="pill pill-wide active" id="btnSegKey" aria-pressed="true" title="Mã đoạn ví dụ DN7.0.1">
              <span class="pill-icon">#</span> Segment ID
            </button>
          </div>
        </div>
      </div>

      <!-- ③ DISPLAY (font size + line height) -->
      <div class="set-sec">
        <div class="set-sec-hd">
          <span class="set-sec-title" id="settingsDisplayLabel">Hiển thị</span>
        </div>
        <div class="set-sec-body">
          <div class="slider-row">
            <div class="slider-label-row">
              <span class="set-mini-label" id="settingsFontSizeLabel">Cỡ chữ</span>
              <span class="slider-value-badge" id="zoomValueBadge">100%</span>
            </div>
            <div class="slider-track-wrap">
              <input type="range" class="sutra-slider" id="sliderZoom"
                     min="80" max="160" step="5" value="100"
                     aria-label="Cỡ chữ">
              <button class="slider-reset-btn" id="btnZoomReset" title="Reset" aria-label="Reset cỡ chữ">↺</button>
            </div>
          </div>
          <div class="slider-row">
            <div class="slider-label-row">
              <span class="set-mini-label" id="settingsLineHeightLabel">Giãn dòng</span>
              <span class="slider-value-badge" id="lineHeightValueBadge">1.85</span>
            </div>
            <div class="slider-track-wrap">
              <input type="range" class="sutra-slider" id="sliderLineHeight"
                     min="130" max="260" step="5" value="185"
                     aria-label="Giãn dòng">
              <button class="slider-reset-btn" id="btnLineHeightReset" title="Reset" aria-label="Reset giãn dòng">↺</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ④ TTS -->
      <div class="set-sec" id="ttsSection">
        <div class="set-sec-hd">
          <span class="set-sec-title" id="settingsTtsTitle">Đọc kinh</span>
          <span class="set-sec-sub" id="settingsTtsUiLabel">Text-to-Speech</span>
        </div>
        <div class="set-sec-body">
          <div class="tts-bar">
            <button class="tts-btn" id="btnReadTts"  title="Phát" aria-label="Phát TTS">▶</button>
            <button class="tts-btn" id="btnPauseTts" title="Tạm dừng" aria-label="Tạm dừng TTS" disabled>⏸</button>
